          - text: "Культурный центр находится в Риге и объединяет всех татар и башкир Латвии. Центр ведет образовательную и развлекательную деятельность. Объединение активно сотрудничает с Республикой Татарстан, приглашает татарских актеров, поэтов, певцов на праздники. При сообществе работает ансамбль «Чишмэ», который пользуется популярностью у жителей Латвии. Юные участники ансамбля принимают участие в ежегодной детской олимпиаде народного творчества. Объединение устраивает культурные мероприятия, встречи, тематические вечера, обучает татарскому языку всех желающих. Руководитель ― Зайнуллин Зуфар. Контакты:"
